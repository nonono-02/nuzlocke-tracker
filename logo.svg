<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip-top">
      <rect x="0" y="0" width="512" height="256"/>
    </clipPath>
    <clipPath id="clip-bot">
      <rect x="0" y="256" width="512" height="256"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="#111318"/>

  <!-- Subtle inner glow ring on background -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.18"/>

  <!-- Pokéball top half — green fill -->
  <circle cx="256" cy="256" r="195" fill="#22c55e" clip-path="url(#clip-top)"/>

  <!-- Green top half inner highlight -->
  <ellipse cx="210" cy="185" rx="68" ry="42" fill="white" opacity="0.1" clip-path="url(#clip-top)"/>

  <!-- Pokéball bottom half — dark surface -->
  <circle cx="256" cy="256" r="195" fill="#1e2235" clip-path="url(#clip-bot)"/>

  <!-- Divider band -->
  <rect x="61" y="238" width="390" height="36" fill="#111318"/>

  <!-- Pokéball outer ring -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#22c55e" stroke-width="14"/>

  <!-- Center button outer ring (dark fill to mask divider) -->
  <circle cx="256" cy="256" r="62" fill="#111318" stroke="#22c55e" stroke-width="12"/>

  <!-- Skull inside center button -->
  <!-- Skull cranium -->
  <ellipse cx="256" cy="249" rx="28" ry="24" fill="#22c55e"/>
  <!-- Skull jaw -->
  <rect x="237" y="266" width="38" height="14" rx="3" fill="#22c55e"/>
  <!-- Left eye socket -->
  <ellipse cx="245" cy="248" rx="7.5" ry="8" fill="#111318"/>
  <!-- Right eye socket -->
  <ellipse cx="267" cy="248" rx="7.5" ry="8" fill="#111318"/>
  <!-- Nose cavity -->
  <path d="M253 260 L256 255 L259 260 Z" fill="#111318"/>
  <!-- Teeth gaps -->
  <rect x="243" y="270" width="5" height="10" rx="1" fill="#111318"/>
  <rect x="253" y="270" width="5" height="10" rx="1" fill="#111318"/>
  <rect x="263" y="270" width="5" height="10" rx="1" fill="#111318"/>

  <!-- Center button border ring (on top of skull) -->
  <circle cx="256" cy="256" r="62" fill="none" stroke="#22c55e" stroke-width="12"/>

  <!-- Subtle green glow dot at very center -->
  <circle cx="256" cy="256" r="6" fill="#4ade80" opacity="0.6" filter="url(#glow)"/>
</svg>
